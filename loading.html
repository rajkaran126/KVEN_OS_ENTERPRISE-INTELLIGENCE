<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kven OS — Loading</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@500;600&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;background:#060504;color:#f6e9c8;font-family:Manrope,Arial}.screen{width:100%;height:100%;display:grid;place-content:center;justify-items:center;gap:28px;background:radial-gradient(circle at 50% 40%,#251705 0,transparent 34%),#060504}.mark{width:118px;height:118px;background:transparent url('assets/kven-os-logo-transparent.png') center top/204px 204px no-repeat}.label{color:#d9b25d;font:500 10px 'DM Mono';letter-spacing:3px;text-transform:uppercase}.track{width:min(370px,72vw);height:5px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:#edbd51;transition:width .14s linear}.percent{font:500 13px 'DM Mono';letter-spacing:2px;color:#ffdf91}
</style></head><body><main class="screen"><div class="mark" role="img" aria-label="Kven OS"></div><div class="label">Loading workspace</div><div class="track"><div class="fill" id="fill"></div></div><div class="percent"><span id="percent">0</span>%</div></main><script>
const fill=document.getElementById('fill'),percent=document.getElementById('percent');let value=0;const timer=setInterval(()=>{value=Math.min(100,value+5);fill.style.width=value+'%';percent.textContent=value;if(value===100){clearInterval(timer);setTimeout(()=>location.replace('login.html'),300)}},80);
</script></body></html>
