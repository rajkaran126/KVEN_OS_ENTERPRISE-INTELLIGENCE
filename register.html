<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kven OS — Register</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"><style>
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 18% 15%,#37240d 0,transparent 26%),#070605;color:#f6e9c8;font:14px Manrope,Arial}.box{width:min(100%,560px);border:1px solid #5e4923;border-radius:20px;padding:38px;background:rgba(17,13,8,.9);box-shadow:0 28px 90px #0009}.brand{color:#edbd51;font-size:20px;font-weight:800}.tag{font:10px 'DM Mono';letter-spacing:1px;color:#edbd51;text-transform:uppercase;margin-top:38px}.box h1{font-size:32px;color:#ffdf91;margin:12px 0 7px}.box p{color:#b6a987;line-height:1.65;font-size:12px}form{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}label{display:grid;gap:6px;font-size:11px;color:#d9cbaa}.wide{grid-column:1/-1}.field{border:1px solid #5e4923;border-radius:9px;background:#080705;color:#f6e9c8;padding:12px;font:13px Manrope;outline:0}.field:focus{border-color:#edbd51}button{grid-column:1/-1;border:0;border-radius:999px;background:#edbd51;color:#241605;font:800 12px Manrope;padding:13px;cursor:pointer;margin-top:8px}a{color:#ffdf91}@media(max-width:520px){form{grid-template-columns:1fr}.box{padding:28px}}
</style></head><body><main class="box"><div class="brand">Kven OS</div><div class="tag">Step 1 of 2 · organisation registration</div><h1>Start your workspace.</h1><p>Create the administrator profile that will set up your team workspace.</p><form id="register"><label>First name<input class="field" id="first" required></label><label>Last name<input class="field" id="last" required></label><label class="wide">Work email<input class="field" id="email" type="email" required placeholder="name@company.com"></label><label class="wide">Organisation name<input class="field" id="company" required placeholder="e.g. Northstar Manufacturing"></label><label class="wide">Password<input class="field" type="password" minlength="8" required placeholder="At least 8 characters"></label><button>Create administrator profile →</button></form><p>Already have access? <a href="login.html">Sign in</a></p></main><script>document.getElementById('register').onsubmit=e=>{e.preventDefault();localStorage.setItem('kven-user',JSON.stringify({name:document.getElementById('first').value+' '+document.getElementById('last').value,email:document.getElementById('email').value,company:document.getElementById('company').value}));location.href='create-workspace.html'}</script></body></html>
